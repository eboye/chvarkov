name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  # ── 1. Binary tarball ────────────────────────────────────────────────────────
  binary:
    name: Build binary tarball
    runs-on: ubuntu-latest
    container:
      image: fedora:41
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Install system dependencies
        run: |
          dnf install -y \
            gtk4-devel \
            libadwaita-devel \
            gtksourceview5-devel \
            glib2-devel \
            pkg-config \
            gcc \
            curl \
            tar

      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2

      - name: Build release binary
        run: cargo build --release

      - name: Compile GSettings schema
        run: |
          mkdir -p release/compiled_schemas
          cp net.nocopypaste.chvarkov.gschema.xml release/compiled_schemas/
          glib-compile-schemas release/compiled_schemas/

      - name: Package tarball
        run: |
          cp target/release/chvarkov release/chvarkov
          cp data/net.nocopypaste.chvarkov.desktop release/
          cp data/net.nocopypaste.chvarkov.svg release/
          cp data/net.nocopypaste.chvarkov.metainfo.xml release/
          tar -czf chvarkov-linux-amd64.tar.gz \
            -C release \
            chvarkov \
            compiled_schemas \
            net.nocopypaste.chvarkov.desktop \
            net.nocopypaste.chvarkov.svg \
            net.nocopypaste.chvarkov.metainfo.xml

      - uses: actions/upload-artifact@v4
        with:
          name: binary-tarball
          path: chvarkov-linux-amd64.tar.gz

  # ── 2. AppImage ──────────────────────────────────────────────────────────────
  # Build entirely inside Fedora 41 container so all GTK/Adwaita libs are
  # available, then package with appimagetool.
  appimage:
    name: Build AppImage
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Install FUSE on host (needed to run AppImages)
        run: sudo apt-get update && sudo apt-get install -y libfuse2

      - name: Build AppImage inside Fedora 41 container
        uses: addnab/docker-run-action@v3
        with:
          image: fedora:41
          options: -v ${{ github.workspace }}:/workspace -w /workspace --privileged
          run: |
            dnf install -y \
              gtk4-devel \
              libadwaita-devel \
              gtksourceview5-devel \
              glib2-devel \
              pkg-config \
              gcc \
              curl \
              wget \
              fuse \
              desktop-file-utils \
              librsvg2 \
              gdk-pixbuf2 \
              patchelf \
              file
            curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs | sh -s -- -y --default-toolchain stable
            source "$HOME/.cargo/env"
            cargo build --release

            # Download appimagetool
            wget -qO /usr/local/bin/appimagetool \
              https://github.com/AppImage/AppImageKit/releases/download/continuous/appimagetool-x86_64.AppImage
            chmod +x /usr/local/bin/appimagetool

            # Assemble AppDir
            mkdir -p AppDir/usr/bin
            mkdir -p AppDir/usr/share/glib-2.0/schemas
            mkdir -p AppDir/usr/share/applications
            mkdir -p AppDir/usr/share/icons/hicolor/scalable/apps
            mkdir -p AppDir/usr/share/metainfo

            cp target/release/chvarkov AppDir/usr/bin/chvarkov
            cp AppRun AppDir/AppRun
            chmod +x AppDir/AppRun
            cp net.nocopypaste.chvarkov.gschema.xml AppDir/usr/share/glib-2.0/schemas/
            glib-compile-schemas AppDir/usr/share/glib-2.0/schemas/
            cp data/net.nocopypaste.chvarkov.desktop AppDir/usr/share/applications/
            cp data/net.nocopypaste.chvarkov.svg AppDir/usr/share/icons/hicolor/scalable/apps/
            cp data/net.nocopypaste.chvarkov.metainfo.xml AppDir/usr/share/metainfo/

            # AppImage requires a top-level .desktop and icon symlink
            cp data/net.nocopypaste.chvarkov.desktop AppDir/
            cp data/net.nocopypaste.chvarkov.svg AppDir/
            ln -sf net.nocopypaste.chvarkov.svg AppDir/.DirIcon

            # Bundle all shared library dependencies.
            # Exclude glibc family — they are ABI-coupled to the kernel and must
            # come from the host, never bundled in an AppImage.
            EXCLUDE='^lib(c|m|dl|rt|pthread|resolv|nss_|nsl|util|mvec|ld-linux|ld-musl|BrokenLocale|anl|cidn|crypt|nss|z)\.'
            mkdir -p AppDir/usr/lib
            bundle_libs() {
              ldd "$1" 2>/dev/null \
                | awk '/=> \// {print $3}' \
                | grep -v '^$' \
                | while read lib; do
                    base=$(basename "$lib")
                    echo "$base" | grep -qE "$EXCLUDE" && continue
                    cp -n "$lib" AppDir/usr/lib/ 2>/dev/null || true
                  done
            }
            bundle_libs AppDir/usr/bin/chvarkov
            # One extra pass for GTK/GLib plugin deps
            find AppDir/usr/lib -name '*.so*' -type f | while read bundled; do
              bundle_libs "$bundled"
            done

            # Build AppImage (extract first to run without FUSE in container)
            /usr/local/bin/appimagetool --appimage-extract-and-run AppDir chvarkov-linux-amd64.AppImage
            chmod -R 777 chvarkov-linux-amd64.AppImage

      - uses: actions/upload-artifact@v4
        with:
          name: appimage
          path: chvarkov-linux-amd64.AppImage

  # ── 3. Flatpak ───────────────────────────────────────────────────────────────
  flatpak:
    name: Build Flatpak bundle
    runs-on: ubuntu-latest
    container:
      image: bilelmoussaoui/flatpak-github-actions:gnome-nightly
      options: --privileged

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        run: |
          curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs | sh -s -- -y --default-toolchain stable
          echo "$HOME/.cargo/bin" >> $GITHUB_PATH

      - name: Vendor Cargo dependencies
        run: |
          cargo vendor vendor
          # Write the vendored config so flatpak-builder's offline cargo build works
          mkdir -p .cargo
          cat > .cargo/config.toml <<'TOML'
          [alias]
          xtask = "run --package xtask --"

          [source.crates-io]
          replace-with = "vendored-sources"

          [source.vendored-sources]
          directory = "vendor"
          TOML

      - uses: flatpak/flatpak-github-actions/flatpak-builder@v6
        with:
          bundle: chvarkov-linux-amd64.flatpak
          manifest-path: net.nocopypaste.chvarkov.yml
          cache-key: flatpak-builder-${{ github.sha }}

      - uses: actions/upload-artifact@v4
        with:
          name: flatpak-bundle
          path: chvarkov-linux-amd64.flatpak

  # ── 4. GitHub Release ────────────────────────────────────────────────────────
  release:
    name: Publish GitHub Release
    needs: [binary, appimage, flatpak]
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/download-artifact@v4
        with:
          merge-multiple: true

      - uses: softprops/action-gh-release@v2
        with:
          files: |
            chvarkov-linux-amd64.tar.gz
            chvarkov-linux-amd64.AppImage
            chvarkov-linux-amd64.flatpak
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
