name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    name: Build and Release
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libgtk-4-dev \
            libadwaita-1-dev \
            libgtksourceview-5-dev \
            pkg-config \
            build-essential

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Build release
        run: cargo build --release

      - name: Package Binary
        run: |
          mkdir -p release
          cp target/release/chvarkov release/chvarkov
          tar -czf chvarkov-linux-amd64.tar.gz -C release chvarkov

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: chvarkov-linux-amd64.tar.gz
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
