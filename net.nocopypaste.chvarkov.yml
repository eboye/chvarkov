app-id: net.nocopypaste.chvarkov
runtime: org.gnome.Platform
runtime-version: '47'
sdk: org.gnome.Sdk

command: chvarkov

finish-args:
  - --share=ipc
  - --socket=fallback-x11
  - --socket=wayland
  - --device=dri
  - --filesystem=home
  - --filesystem=xdg-run/gvfsd
  - --talk-name=org.gtk.vfs.*

modules:
  - name: gtksourceview5
    buildsystem: meson
    sources:
      - type: git
        url: https://gitlab.gnome.org/GNOME/gtksourceview.git
        tag: 5.14.1

  - name: chvarkov
    buildsystem: simple
    build-commands:
      - curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs | sh -s -- -y --default-toolchain stable
      - /root/.cargo/bin/cargo build --release --verbose
      - install -Dm755 target/release/chvarkov /app/bin/chvarkov
      - install -Dm644 data/net.nocopypaste.chvarkov.desktop /app/share/applications/net.nocopypaste.chvarkov.desktop
      - install -Dm644 data/net.nocopypaste.chvarkov.svg /app/share/icons/hicolor/scalable/apps/net.nocopypaste.chvarkov.svg
      - install -Dm644 data/net.nocopypaste.chvarkov.metainfo.xml /app/share/metainfo/net.nocopypaste.chvarkov.metainfo.xml
      - install -Dm644 net.nocopypaste.chvarkov.gschema.xml /app/share/glib-2.0/schemas/net.nocopypaste.chvarkov.gschema.xml
      - glib-compile-schemas /app/share/glib-2.0/schemas/
    build-options:
      build-args:
        - --share=network
      env:
        CARGO_HOME: /run/build/chvarkov/cargo
    sources:
      - type: dir
        path: .
